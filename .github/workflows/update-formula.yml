name: Update Formula on Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to update (e.g., v0.260.124-900)'
        required: true
        type: string
  repository_dispatch:
    types: [release-published]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: release
        run: |
          TAG=""
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" == "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            TAG="${{ github.event.client_payload.tag }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Error: Could not determine tag"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Check release exists
        run: |
          TAG="${{ steps.release.outputs.tag }}"

          # Check if release exists
          echo "Checking if release $TAG exists..."
          if ! gh release view "$TAG" --repo tingly-dev/tingly-box >/dev/null 2>&1; then
            echo "Error: Release $TAG does not exist"
            exit 1
          fi
          echo "✓ Release $TAG exists"

          # Check if required assets exist
          echo "Checking required assets..."
          ASSETS=(
            "tingly-box-macos-arm64.zip"
            "tingly-box-macos-amd64.zip"
            "tingly-box-linux-amd64.zip"
            "tingly-box-linux-arm64.zip"
          )

          for asset in "${ASSETS[@]}"; do
            if ! gh release view "$TAG" --repo tingly-dev/tingly-box --json assets --jq ".assets[] | select(.name == \"$asset\") | .name" | grep -q "$asset"; then
              echo "Warning: Asset $asset not found in release $TAG (may be optional)"
            else
              echo "✓ Found $asset"
            fi
          done

          echo "✓ Validation complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate formula
        run: |
          VERSION=${{ steps.release.outputs.tag }}

          # Download assets and compute SHA256
          download_and_hash() {
            local platform=$1
            local arch=$2
            local url="https://github.com/tingly-dev/tingly-box/releases/download/${VERSION}/tingly-box-${platform}-${arch}.zip"
            local filename="tingly-box-${platform}-${arch}.zip"

            if curl -fsSL -o "$filename" "$url"; then
              local hash=$(shasum -a 256 "$filename" | awk '{print $1}')
              rm "$filename"
              echo "$hash"
            else
              echo ""
            fi
          }

          SHA_DARWIN_ARM64=$(download_and_hash "macos" "arm64")
          SHA_DARWIN_AMD64=$(download_and_hash "macos" "amd64")
          SHA_LINUX_AMD64=$(download_and_hash "linux" "amd64")
          SHA_LINUX_ARM64=$(download_and_hash "linux" "arm64")

          if [ -z "$SHA_DARWIN_ARM64" ] || [ -z "$SHA_DARWIN_AMD64" ] || [ -z "$SHA_LINUX_AMD64" ]; then
            echo "Error: Failed to download required assets"
            exit 1
          fi

          if [ -z "$SHA_LINUX_ARM64" ]; then
            echo "Warning: Linux ARM64 not available, using empty hash"
            SHA_LINUX_ARM64=""
          fi

          export VERSION="$VERSION"
          export SHA256_DARWIN_ARM64="$SHA_DARWIN_ARM64"
          export SHA256_DARWIN_AMD64="$SHA_DARWIN_AMD64"
          export SHA256_LINUX_AMD64="$SHA_LINUX_AMD64"
          export SHA256_LINUX_ARM64="$SHA_LINUX_ARM64"

          echo "Generating formula with VERSION=$VERSION"
          echo "  macOS ARM64: $SHA_DARWIN_ARM64"
          echo "  macOS AMD64: $SHA_DARWIN_AMD64"
          echo "  Linux AMD64: $SHA_LINUX_AMD64"
          echo "  Linux ARM64: ${SHA_LINUX_ARM64:-<not available>}"

          ruby Formula/generate.rb

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet Formula/tingly-box.rb; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tingly-box.rb
          git commit -m "Update formula to ${{ steps.release.outputs.tag }}"
          gh repo set-default tingly-dev/homebrew-tingly
          git push --repo=https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/tingly-dev/homebrew-tingly.git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
