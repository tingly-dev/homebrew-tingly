name: Update Formula on Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to update (e.g., v0.260.124-900)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "Error: Tag input is required"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"
        id: release

      - name: Check release exists
        run: |
          TAG="${{ steps.release.outputs.tag }}"

          # Check if release exists
          echo "Checking if release $TAG exists..."
          if ! gh release view "$TAG" --repo tingly-dev/tingly-box >/dev/null 2>&1; then
            echo "Error: Release $TAG does not exist"
            exit 1
          fi
          echo "✓ Release $TAG exists"

          # Check if required assets exist
          echo "Checking required assets..."
          ASSETS=(
            "tingly-box-macos-arm64.zip"
            "tingly-box-macos-amd64.zip"
            "tingly-box-linux-amd64.zip"
          )

          for asset in "${ASSETS[@]}"; do
            if ! gh release view "$TAG" --repo tingly-dev/tingly-box --json assets --jq ".assets[] | select(.name == \"$asset\") | .name" | grep -q "$asset"; then
              echo "Error: Required asset $asset not found in release $TAG"
              exit 1
            fi
            echo "✓ Found $asset"
          done

          echo "✓ All validations passed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate formula
        run: |
          VERSION=${{ steps.release.outputs.tag }}

          # Download assets and compute SHA256
          download_and_hash() {
            local platform=$1
            local arch=$2
            local url="https://github.com/tingly-dev/tingly-box/releases/download/${VERSION}/tingly-box-${platform}-${arch}.zip"
            local filename="tingly-box-${platform}-${arch}.zip"

            curl -sSL -o "$filename" "$url"
            local hash=$(shasum -a 256 "$filename" | awk '{print $1}')
            rm "$filename"
            echo "$hash"
          }

          SHA_DARWIN_ARM64=$(download_and_hash "macos" "arm64")
          SHA_DARWIN_AMD64=$(download_and_hash "macos" "amd64")
          SHA_LINUX_AMD64=$(download_and_hash "linux" "amd64")

          export VERSION="$VERSION"
          export SHA256_DARWIN_ARM64="$SHA_DARWIN_ARM64"
          export SHA256_DARWIN_AMD64="$SHA_DARWIN_AMD64"
          export SHA256_LINUX_AMD64="$SHA_LINUX_AMD64"

          echo "Generating formula with VERSION=$VERSION"
          ruby Formula/generate.rb

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet Formula/tingly-box.rb; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tingly-box.rb
          git commit -m "Update formula to ${{ steps.release.outputs.tag }}"
          gh repo set-default tingly-dev/tap
          git push --repo=https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/tingly-dev/tap.git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
